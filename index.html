<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>She Can Foundation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#D7CCC8;
}

.container{
    width:100%;
    max-width:500px;
    background:#FFF8F0;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#5D4037;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#8D6E63;
    margin-bottom:30px;
    font-size:14px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#5D4037;
    font-weight:600;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:2px solid #D7CCC8;
    border-radius:10px;
    font-size:15px;
    background:#fff;
    transition:0.3s;
}

input:focus,
textarea:focus{
    outline:none;
    border-color:#8D6E63;
}

textarea{
    resize:none;
    min-height:120px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#8D6E63;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#6D4C41;
}

#success{
    margin-top:20px;
    text-align:center;
    color:green;
    font-weight:bold;
}

@media(max-width:600px){

.container{
    margin:20px;
    padding:25px;
}

}
</style>
</head>

<body>

<div class="container">

    <h1>She Can Foundation</h1>

    <p class="subtitle">
        Empowering Women Through Education & Technology
    </p>

    <form id="contactForm">

        <div class="form-group">
            <label>Full Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter your name"
                required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea
                id="message"
                placeholder="Write your message here..."
                required></textarea>
        </div>

        <button type="submit">
            Submit Form
        </button>

    </form>

    <p id="success"></p>

</div>

<script src="script.js"></script>

</body>
</html>
